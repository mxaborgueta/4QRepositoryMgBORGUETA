<!DOCTYPE html>
<html>
<head>
  <meta name="author" content="<Borgueta, Miguek Xander>" />
  <meta name="revised" content="<March 26, 2026>" />
  <style>
    body { font-family: Arial, sans-serif; }
    .header, .footer {
      background: lightblue;
      padding: 10px;
    }
    .footer {
        position: fixed; bottom: 0; width: 100%;
       opacity: 0.5;
    }
    .sidebar {
        position: relative; top: 130px; left: 20px;
      background: lightgreen;
      width: 150px;
      height: 200px;
    }
    .content {
        position: fixed; top: 70px; left: 100px;
      background: lightyellow;
      width: 300px;
      height: 200px;
    }    
    .notice {
        position: absolute;
        top: 70px;
        left: 320px;
        background: orange;
        padding: 10px;
        z-index: 2;
    }
  </style>
</head>
<body>
  <div class="header">Header</div>
  <div class="sidebar">Sidebar</div>
  <div class="content">Main Content</div>
  <div class="footer">Footer</div>
  <div class="notice">Notice!</div>
</body>
</html>
